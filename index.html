<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Átirányítás folyamatban...</title>
  <style>
    :root {
      --color-background: #0a0a0a;
      --color-surface: #1a1a1a;
      --color-text-primary: #ffffff;
      --color-text-secondary: #a0a0a0;
      --color-primary: #38bdf8;
      --color-primary-hover: #0ea5e9;
      --color-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--color-background);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon-wrapper {
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto;
      background: var(--color-surface);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--color-border);
    }

    .icon svg {
      width: 32px;
      height: 32px;
      color: var(--color-primary);
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--color-text-secondary);
      margin-bottom: 2rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: var(--color-primary);
      color: #000;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .button:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(56, 189, 248, 0.25);
    }

    .button:active {
      transform: translateY(0);
    }

    .button svg {
      width: 18px;
      height: 18px;
    }

    .status {
      margin-top: 2.5rem;
      padding: 1rem;
      background: var(--color-surface);
      border-radius: 12px;
      border: 1px solid var(--color-border);
      font-size: 0.875rem;
      color: var(--color-text-secondary);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.5rem;
      }
      p {
        font-size: 0.9375rem;
      }
    }
  </style>

  <script>
    const targetUrl = "https://animedrive.hu";

    window.addEventListener("load", function () {
      try {
        window.location.href = document.referrer;
      } catch (e) {
        console.error("Átirányítás sikertelen:", e);
        document.getElementById("status").innerHTML = '<span style="color: #ef4444;">⚠️ Automatikus átirányítás sikertelen. Kattints a gombra!</span>';
      }
    });

    function manualRedirect() {
      window.location.href = targetUrl;
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
      </div>
    </div>

    <h1>Átirányítás folyamatban</h1>
    <p>Automatikusan továbbítunk a céloldalra. Ha pár másodpercen belül nem történik semmi, használd az alábbi gombot.</p>

    <button class="button" onclick="manualRedirect()">
      Tovább a céloldalra
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
      </svg>
    </button>

    <div class="status" id="status">
      <span class="spinner"></span>
      Átirányítás előkészítése...
    </div>
  </div>
</body>
</html>
